name: Build CVs

on:
  push:
    branches:
      - main
    paths:
      - 'main.tex'
      - 'industry.tex'
      - 'academic.tex'
      - 'references.bib'
  workflow_dispatch:

jobs:
  build_cv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Industry CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: industry.tex

      - name: Build Academic CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: academic.tex
