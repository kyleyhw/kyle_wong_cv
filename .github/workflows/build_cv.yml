name: Build and Deploy CVs

on:
  push:
    branches:
      - main
    paths:
      - 'main.tex'
      - 'industry.tex'
      - 'academic.tex'
      - 'references.bib'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_cv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Industry CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: industry.tex

      - name: Build Academic CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: academic.tex

      - name: Rename and Organize PDFs
        run: |
          MONTH=$(date +%b | tr '[:upper:]' '[:lower:]')
          YEAR=$(date +%Y)
          mv industry.pdf kyle_wong_cv_${MONTH}_${YEAR}_industry.pdf
          mv academic.pdf kyle_wong_cv_${MONTH}_${YEAR}_academic.pdf

      - name: Commit and Push Updated PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate Industry and Academic CVs (GitHub Actions)"
          file_pattern: 'kyle_wong_cv_*.pdf'
          branch: main
